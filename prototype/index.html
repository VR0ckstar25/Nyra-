<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anvara — Working Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:radial-gradient(135% 105% at 50% -12%, #EAF4FC 0%, #DEEAF4 45%, #D3E0EC 100%);
    font-family:'Hanken Grotesk',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .phone{width:392px;height:850px;border-radius:46px;background:#fff;overflow:hidden;position:relative;
    box-shadow:0 2px 4px rgba(40,30,20,.08),0 30px 80px rgba(40,30,20,.22),0 0 0 1px rgba(40,30,20,.05);display:flex;flex-direction:column}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .tag{font-family:'Spline Sans Mono',monospace}
  .nudge{position:fixed;left:18px;bottom:14px;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#5c6471}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .view{animation:fade .32s ease both}
</style>
</head>
<body>
<div id="root"></div>
<div class="nudge">Full flow · real matching on the real DB · Welcome → Profile → Scan → Result · tabs at the bottom</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="data.js"></script>
<script src="engine.js"></script>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;
const D = window.SFIS_DATA;
const { runMatch, subLabel } = window.SFIS_ENGINE;
const parentById = Object.fromEntries(D.parents.map(p=>[p.id,p]));

/* ───── THEME (ported from tokens.js) ───── */
const BACKGROUNDS = {
  sky:{label:'Sky',bg:'#E9F3FB',bgDeep:'#D6E8F6',surfaceWarm:'#F4FAFE'},
  mint:{label:'Mint',bg:'#E6F5EE',bgDeep:'#D2EBDF',surfaceWarm:'#F2FBF7'},
  lemon:{label:'Lemon',bg:'#FBF6DD',bgDeep:'#F3EAC2',surfaceWarm:'#FEFBEC'},
  lavender:{label:'Lavender',bg:'#F1ECFB',bgDeep:'#E2D8F4',surfaceWarm:'#F8F4FD'},
  blossom:{label:'Blossom',bg:'#FCEDF3',bgDeep:'#F6DCE7',surfaceWarm:'#FEF5F8'},
};
const ACCENTS = {
  cobalt:{label:'Cobalt',accent:'#3360CE',accentDeep:'#284BA0',accentSoft:'#DFE7F7',accentTint:'#F0F4FC'},
  turquoise:{label:'Turquoise',accent:'#0EA5A2',accentDeep:'#0B8280',accentSoft:'#D5F0EF',accentTint:'#EBF8F7'},
  fuchsia:{label:'Fuchsia',accent:'#D6398A',accentDeep:'#AC2C6E',accentSoft:'#FAE0EE',accentTint:'#FDF0F7'},
  grape:{label:'Grape',accent:'#8139C2',accentDeep:'#66299E',accentSoft:'#EFE0F8',accentTint:'#F7F0FB'},
};
const FIXED = {
  surface:'#FFFFFF', onAccent:'#FBF7EF', ink:'#222932', ink2:'#5C6471', ink3:'#97A1AE',
  line:'#E2E8EF', lineSoft:'#EDF1F6', amber:'#E89318',
  allergen:{tint:'#FDEBC9',edge:'#F4CE83',strong:'#D2870F',ink:'#7E5410',label:'#96640F'},
  intolerance:{tint:'#FBE2CC',edge:'#F1C198',strong:'#CA6A2C',ink:'#7E3E1A',label:'#A1531F'},
  goal:{tint:'#E7E9F1',edge:'#CCD1E0',strong:'#6A7396',ink:'#414B66',label:'#4D5772'},
  serif:"'Source Serif 4',serif", sans:"'Hanken Grotesk',sans-serif", mono:"'Spline Sans Mono',monospace", radius:18,
};
const buildTheme = (bg,ac) => ({...FIXED,...(BACKGROUNDS[bg]||BACKGROUNDS.sky),...(ACCENTS[ac]||ACCENTS.cobalt)});

function useStored(key,init){
  const [v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch(e){return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch(e){}},[key,v]);
  return [v,setV];
}

/* a fixed demo scan used by the Camera path (simulated OCR) */
const SCAN = { name:'Harvest Trail Granola Bar', brand:'Field & Oat Co.',
  text:'Whole grain oats, cane sugar, peanuts, almonds, whey, milk solids, palm oil, soy lecithin, natural flavors, sea salt.\nMay contain sesame.' };
const FAMILY = [{k:'Y',name:'You'}];

/* ───── atoms ───── */
const Btn=({t,onClick,children,kind='primary'})=>(
  <button onClick={onClick} style={{width:'100%',height:50,borderRadius:14,
    background:kind==='primary'?t.accent:t.surface,color:kind==='primary'?t.onAccent:t.ink,
    border:kind==='primary'?'none':`1px solid ${t.line}`,fontFamily:t.sans,fontSize:16,fontWeight:600}}>{children}</button>);
const Section=({t,children,right})=>(
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'20px 0 10px'}}>
    <span className="tag" style={{fontSize:11,letterSpacing:1.4,textTransform:'uppercase',color:t.ink3}}>{children}</span>
    {right}</div>);
const Avatar=({t,k,on,child,size=34})=>(
  <div style={{width:size,height:size,borderRadius:'50%',display:'grid',placeItems:'center',fontFamily:t.sans,fontWeight:800,fontSize:size*0.4,
    background:child?'#E7D9C4':t.accentSoft,color:child?'#8A6B3D':t.accentDeep,
    transform:on?'scale(1.12)':'scale(1)',transition:'transform .22s cubic-bezier(.2,.7,.3,1),box-shadow .22s',
    boxShadow:on?`0 0 0 2px ${t.surface},0 0 0 4px ${t.accent}`:'none'}}>{k}</div>);

function MatchBar({t,data,child}){
  const pal=t[data.cat], V={contains:child?'Has':'Contains',may:'May contain'};
  return(<div style={{display:'flex',borderRadius:t.radius,background:t.surface,border:`1px solid ${t.line}`,overflow:'hidden',marginBottom:14}}>
    <div style={{width:5,background:pal.strong}}/>
    <div style={{flex:1}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'13px 14px 5px'}}>
        <div style={{width:13,height:13,borderRadius:7,background:t.amber}}/>
        <div style={{fontFamily:t.sans,fontWeight:800,fontSize:13,letterSpacing:.4,textTransform:'uppercase',color:pal.label}}>{data.label}</div>
      </div>
      {data.items.map((it,i)=>(
        <div key={i} style={{padding:'12px 14px',borderTop:`1px solid ${t.lineSoft}`}}>
          <div className="tag" style={{fontSize:10.5,letterSpacing:1,textTransform:'uppercase',color:pal.label,marginBottom:3}}>{V[it.kind]||'Contains'}</div>
          <div style={{fontFamily:t.sans,fontWeight:700,fontSize:18,color:t.ink,letterSpacing:-.2}}>{it.common}</div>
          {it.technical&&!child&&<div style={{fontFamily:t.sans,fontSize:13.5,color:t.ink2,marginTop:2}}>(found as “{it.technical}”)</div>}
          {it.note&&<div style={{fontFamily:t.sans,fontSize:13,color:t.ink2,marginTop:3,lineHeight:'18px'}}>{it.note}</div>}
          <div style={{display:'flex',gap:6,marginTop:9}}>
            {FAMILY.map(f=><span key={f.name} style={{display:'inline-flex',alignItems:'center',gap:5,height:22,padding:'0 9px 0 5px',
              borderRadius:999,background:t.surfaceWarm,border:`1px solid ${t.line}`,fontFamily:t.sans,fontSize:11.5,fontWeight:700,color:t.ink2}}>
              <span style={{width:15,height:15,borderRadius:'50%',display:'grid',placeItems:'center',background:t.accentSoft,color:t.accentDeep,fontSize:8.5,fontWeight:800}}>{f.k}</span>{f.name}</span>)}
          </div>
        </div>
      ))}
    </div>
  </div>);
}

/* ───── TAB BAR (icons from the Claude design / theme.jsx) ───── */
const TAB_ICON={
  scan:(c)=><g fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8V6.2A2.2 2.2 0 0 1 5.2 4H7l1.2-1.6h4.6L14 4h1.8A2.2 2.2 0 0 1 18 6.2V8"/><rect x="3" y="8" width="15" height="9.5" rx="2.4"/><circle cx="10.5" cy="12.6" r="3"/></g>,
  diary:(c)=><g fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="3.5" y="4" width="14" height="13.5" rx="2.4"/><path d="M3.5 8h14M7 2.6v2.8M14 2.6v2.8"/><circle cx="7.4" cy="11.6" r="1" fill={c} stroke="none"/><circle cx="10.5" cy="11.6" r="1" fill={c} stroke="none"/><circle cx="13.6" cy="11.6" r="1" fill={c} stroke="none"/></g>,
  patterns:(c)=><g fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M3.5 17V9.5M8 17V4.5M12.5 17v-5M17 17V7.5"/></g>,
  profiles:(c)=><g fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="10.5" cy="7.5" r="3.4"/><path d="M4.5 17.4c.7-3.3 3.1-5 6-5s5.3 1.7 6 5"/></g>,
};
function Tabs({t,screen,go}){
  const items=[['scan','Scan'],['diary','Diary'],['patterns','Patterns'],['profiles','Profile']];
  const active=({scan:'scan',camera:'scan',processing:'scan',result:'scan',diary:'diary',patterns:'patterns',profiles:'profiles',appearance:'profiles'})[screen];
  return(<div style={{flex:'0 0 auto',display:'flex',background:'rgba(255,255,255,.9)',backdropFilter:'blur(14px)',borderTop:`1px solid ${t.line}`,padding:'8px 8px 20px'}}>
    {items.map(([id,label])=>{const on=active===id;const c=on?t.accent:t.ink3;return(
      <button key={id} onClick={()=>go(id==='scan'?'camera':id)} style={{flex:1,minHeight:44,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'4px 0'}}>
        <svg width="22" height="22" viewBox="0 0 21 21">{TAB_ICON[id](c)}</svg>
        <span style={{fontFamily:t.sans,fontSize:10.5,fontWeight:on?800:600,color:c,letterSpacing:.2}}>{label}</span>
      </button>);})}
  </div>);
}

/* ───── 01 Welcome ───── */
function Welcome({t,go}){
  return(<div className="scroll view" style={{background:t.bg,padding:'64px 26px',display:'flex',flexDirection:'column'}}>
    <div className="tag" style={{fontSize:13,color:t.ink3}}>9:41</div>
    <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center'}}>
      <div style={{fontFamily:t.serif,fontSize:34,lineHeight:'40px',color:t.ink}}>Shop with a little less worry.</div>
      <div style={{fontFamily:t.sans,fontSize:16,color:t.ink2,lineHeight:'24px',marginTop:14}}>
        Scan a label and we’ll quietly reflect what’s inside against the things you and your family care about. No verdicts — just what’s there.</div>
    </div>
    <Btn t={t} onClick={()=>go('profile_setup')}>Get started</Btn>
    <button onClick={()=>go('email')} style={{fontFamily:t.sans,fontSize:14,fontWeight:600,color:t.accentDeep,marginTop:16}}>I already have an account</button>
  </div>);
}

/* ───── 02 Profile setup (search + tiles + severity) ───── */
function ProfileSetup({t,profile,setProfile,severity,setSeverity,go}){
  const [q,setQ]=useState('');
  const allergens=D.subGroups.filter(s=>s.domain==='ALLERGEN');
  const intol=D.subGroups.filter(s=>s.domain==='INTOLERANCE');
  const show=arr=>arr.filter(s=>!q||s.label.toLowerCase().includes(q.toLowerCase()));
  const toggle=id=>setProfile(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const SEV=['Mild','Moderate','Severe'];
  const results=useMemo(()=>{const nq=q.toLowerCase().trim(); if(nq.length<2) return [];
    const seen=new Set(), out=[];
    D.synonyms.forEach(s=>{ if(out.length>=8) return;
      if(s.norm.indexOf(nq)>=0){ const p=parentById[s.parent]; if(!p) return;
        const key=s.term.toLowerCase(); if(seen.has(key)) return; seen.add(key);
        out.push({term:s.term, sub:p.sub, parent:p.common}); }});
    return out;},[q]);
  const Tile=({s,beta})=>{const on=profile.includes(s.id);return(
    <button onClick={()=>toggle(s.id)} style={{padding:'13px 14px',borderRadius:12,textAlign:'left',position:'relative',
      border:`${on?2:1}px solid ${on?t.accent:t.line}`,background:on?t.accentTint:t.surface}}>
      <span style={{fontFamily:t.sans,fontWeight:600,fontSize:14,color:on?t.accentDeep:t.ink}}>{s.label}</span>
      {beta&&<span className="tag" style={{position:'absolute',top:7,right:7,fontSize:8,letterSpacing:.5,color:t.intolerance.label,background:t.intolerance.tint,borderRadius:6,padding:'2px 5px'}}>BETA</span>}
    </button>);};
  const sevSel=profile.filter(id=>allergens.some(a=>a.id===id));
  return(<div className="scroll view" style={{background:t.bg,padding:22}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span className="tag" style={{fontSize:13,color:t.ink3}}>9:41</span>
      <button onClick={()=>go('email')} style={{fontFamily:t.sans,fontSize:14,fontWeight:600,color:t.ink3}}>Skip</button></div>
    <div style={{fontFamily:t.serif,fontSize:25,color:t.ink,marginTop:10}}>What should we watch for?</div>
    <div style={{fontFamily:t.sans,fontSize:14,color:t.ink2,lineHeight:'20px',marginTop:4}}>Pick any allergens. You can add intolerances and goals next.</div>
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search any ingredient — e.g. casein, semolina, whey…"
      style={{width:'100%',height:44,borderRadius:12,border:`1px solid ${t.line}`,padding:'0 14px',marginTop:14,
        fontFamily:t.sans,fontSize:14.5,color:t.ink,background:t.surface}}/>
    {results.length>0&&<div style={{marginTop:10,background:t.surface,border:`1px solid ${t.line}`,borderRadius:12,overflow:'hidden'}}>
      {results.map((r,i)=>{const on=profile.includes(r.sub);return(
        <button key={i} onClick={()=>{if(!on) toggle(r.sub);}} style={{display:'flex',alignItems:'center',gap:10,width:'100%',textAlign:'left',
          padding:'11px 13px',borderTop:i?`1px solid ${t.lineSoft}`:'none'}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:t.sans,fontSize:14.5,fontWeight:600,color:t.ink}}>{r.term}</div>
            <div style={{fontFamily:t.sans,fontSize:12,color:t.ink2}}>adds “{subLabel(r.sub)}” to your profile</div></div>
          <span style={{fontFamily:t.sans,fontSize:13,fontWeight:700,color:on?t.ink3:t.accentDeep}}>{on?'Added ✓':'+ Add'}</span>
        </button>);})}
    </div>}
    {q.trim().length>=2&&results.length===0&&<div style={{marginTop:10,fontFamily:t.sans,fontSize:13,color:t.ink3}}>We don’t have that one yet — try the tiles below.</div>}
    <Section t={t}>Allergies</Section>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9}}>{show(allergens).map(s=><Tile key={s.id} s={s}/>)}</div>
    <Section t={t}>Intolerances · beta</Section>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9}}>{show(intol).map(s=><Tile key={s.id} s={s} beta/>)}</div>
    {sevSel.length>0&&<>
      <Section t={t}>Your selections · severity</Section>
      {sevSel.map(id=>(
        <div key={id} style={{marginBottom:12}}>
          <div style={{fontFamily:t.sans,fontWeight:700,fontSize:15,color:t.ink,marginBottom:7}}>{subLabel(id)}</div>
          <div style={{display:'flex',gap:8}}>{SEV.map(lv=>{const on=(severity[id]||'Moderate')===lv;return(
            <button key={lv} onClick={()=>setSeverity(v=>({...v,[id]:lv}))} style={{flex:1,height:38,borderRadius:10,
              border:`${on?2:1}px solid ${on?t.accent:t.line}`,background:on?t.accentTint:t.surface,
              fontFamily:t.sans,fontSize:13,fontWeight:on?700:600,color:on?t.accentDeep:t.ink2}}>{lv}</button>);})}</div>
        </div>))}
    </>}
    <div style={{height:16}}/>
    <Btn t={t} onClick={()=>go('email')}>Continue</Btn>
    <div style={{height:24}}/>
  </div>);
}

/* ───── 03 Email ───── */
function Email({t,go}){
  return(<div className="scroll view" style={{background:t.bg,padding:22}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span className="tag" style={{fontSize:13,color:t.ink3}}>9:41</span>
      <button onClick={()=>go('home')} style={{fontFamily:t.sans,fontSize:14,fontWeight:600,color:t.ink3}}>Skip</button></div>
    <div style={{fontFamily:t.serif,fontSize:25,color:t.ink,marginTop:10}}>Where should we keep your record?</div>
    <div style={{fontFamily:t.sans,fontSize:13.5,fontWeight:700,color:t.ink2,marginTop:18}}>Email address</div>
    <div style={{fontFamily:t.sans,fontSize:13.5,color:t.ink2,lineHeight:'19px',margin:'4px 0 10px'}}>We use this only to save your profile and sync your diary across devices.</div>
    <input placeholder="you@example.com" style={{width:'100%',height:46,borderRadius:12,border:`1px solid ${t.line}`,padding:'0 14px',
      fontFamily:t.sans,fontSize:15,color:t.ink,background:t.surface}}/>
    <div style={{background:t.surfaceWarm,border:`1px solid ${t.line}`,borderRadius:12,padding:13,margin:'16px 0'}}>
      <div className="tag" style={{fontSize:9.5,letterSpacing:1,textTransform:'uppercase',color:t.ink3,marginBottom:5}}>Email disclosure · placed verbatim</div>
      <div style={{fontFamily:t.sans,fontSize:13.5,color:t.ink}}>We never sell your data or send marketing.</div>
    </div>
    <Btn t={t} onClick={()=>go('home')}>Continue</Btn>
  </div>);
}

/* ───── 04 Camera — REAL device camera (getUserMedia) ───── */
function Camera({t,go,profile}){
  const videoRef=useRef(null), streamRef=useRef(null);
  const [status,setStatus]=useState('requesting'); // requesting | live | denied | unsupported
  useEffect(()=>{
    let cancelled=false;
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setStatus('unsupported');return;}
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
      .then(stream=>{ if(cancelled){stream.getTracks().forEach(tr=>tr.stop());return;}
        streamRef.current=stream;
        if(videoRef.current){ videoRef.current.srcObject=stream; videoRef.current.play().catch(()=>{}); }
        setStatus('live'); })
      .catch(()=>{ if(!cancelled) setStatus('denied'); });
    return ()=>{ cancelled=true; if(streamRef.current) streamRef.current.getTracks().forEach(tr=>tr.stop()); };
  },[]);
  const stop=()=>{ if(streamRef.current){ streamRef.current.getTracks().forEach(tr=>tr.stop()); streamRef.current=null; } };
  const capture=()=>{ stop(); go('processing'); };
  const back=()=>{ stop(); go('home'); };
  return(<div className="view" style={{flex:1,background:'#1A1714',position:'relative',display:'flex',flexDirection:'column'}}>
    <video ref={videoRef} autoPlay muted playsInline
      style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:status==='live'?1:0,transition:'opacity .4s'}}/>
    <div style={{position:'relative',padding:'16px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:2}}>
      <button onClick={back} style={{color:'#fff',fontFamily:t.sans,fontSize:14}}>‹ Back</button>
      <span className="tag" style={{fontSize:11,color:'#EDE7DD'}}>Front label · Ingredients · 1 of 2</span></div>

    <div style={{position:'relative',flex:1,display:'flex',alignItems:'center',justifyContent:'center',zIndex:2}}>
      {status==='live'&&<div style={{width:300,height:300,borderRadius:20,border:'2px solid rgba(255,255,255,.7)',position:'relative',boxShadow:'0 0 0 9999px rgba(20,17,14,.28)'}}>
        <div style={{position:'absolute',bottom:-34,left:0,right:0,textAlign:'center',color:'#fff',fontFamily:t.sans,fontWeight:600,fontSize:15}}>Fill the box with the ingredient list</div></div>}
      {status==='requesting'&&<div style={{color:'#EDE7DD',fontFamily:t.sans,fontSize:15,textAlign:'center',padding:30}}>Asking to use your camera…<br/><span style={{fontSize:13,color:'#B8B0A4'}}>Tap “Allow” when your device asks.</span></div>}
      {(status==='denied'||status==='unsupported')&&<div style={{background:'rgba(255,255,255,.96)',borderRadius:18,padding:22,margin:24,maxWidth:300}}>
        <div style={{fontFamily:t.serif,fontSize:19,color:t.ink}}>{status==='denied'?'Camera access is off':'Camera not available here'}</div>
        <div style={{fontFamily:t.sans,fontSize:13.5,color:t.ink2,lineHeight:'20px',margin:'7px 0 14px'}}>
          {status==='denied'?'To scan a real label, allow camera access in your browser/device settings. You can still try the flow with a sample label.'
          :'This preview can’t open a camera here. Try the flow with a sample label.'}</div>
        <Btn t={t} onClick={()=>go('processing')}>Use a sample label</Btn>
      </div>}
    </div>

    <div style={{position:'relative',zIndex:2,background:'rgba(20,17,14,.78)',backdropFilter:'blur(6px)',padding:'14px 18px 24px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontFamily:t.sans,fontSize:12.5,color:'#C9C2B8'}}>Scanning for this session</span>
        <span style={{fontFamily:t.sans,fontSize:12.5,fontWeight:700,color:'#fff'}}>+ Add member</span></div>
      <div style={{display:'flex',gap:14,marginBottom:16}}>
        {FAMILY.map(f=><span key={f.name} style={{display:'inline-flex',alignItems:'center',gap:7,color:'#fff',fontFamily:t.sans,fontSize:13}}>
          <Avatar t={t} k={f.k}/>{f.name}</span>)}</div>
      <button onClick={capture} disabled={status!=='live'}
        style={{width:66,height:66,borderRadius:'50%',background:status==='live'?'#fff':'rgba(255,255,255,.4)',
          border:'4px solid rgba(255,255,255,.45)',margin:'0 auto',display:'block'}}/>
    </div>
  </div>);
}

/* ───── 05 Processing ───── */
function Processing({t,profile,go,setResult}){
  const al=profile.map(subLabel);
  const steps=['Reading the label…',`Looking for ${al.slice(0,2).join(' and ')||'your items'}…`,'Checking your intolerances…','Putting your results together…'];
  const [i,setI]=useState(0);
  useEffect(()=>{
    if(i>=steps.length){ setResult({...runMatch(SCAN.text,profile),product:{name:SCAN.name,date:'scanned just now'}}); go('result'); return; }
    const id=setTimeout(()=>setI(i+1),650); return ()=>clearTimeout(id);
  },[i]);
  return(<div className="view" style={{flex:1,background:t.bg,display:'flex',flexDirection:'column',justifyContent:'center',padding:30}}>
    <div className="tag" style={{fontSize:10.5,letterSpacing:1.5,textTransform:'uppercase',color:t.ink3,textAlign:'center',marginBottom:20}}>Reading your label</div>
    {steps.map((s,k)=>(<div key={k} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',opacity:k<=i?1:.3}}>
      <div style={{width:18,height:18,borderRadius:9,border:`2px solid ${k<i?t.accent:t.line}`,background:k<i?t.accent:'transparent',display:'grid',placeItems:'center'}}>
        {k<i&&<span style={{color:t.onAccent,fontSize:11,fontWeight:800}}>✓</span>}</div>
      <span style={{fontFamily:t.sans,fontSize:15,color:k<=i?t.ink:t.ink3}}>{s}</span></div>))}
  </div>);
}

/* ───── 06/07 Result (standard + child) + emoji ───── */
function Result({t,go,result}){
  const {findings,unverified,product}=result;
  const [child,setChild]=useState(false);
  const [rated,setRated]=useState(null);
  const FOOTER="Based on the label as we read it. Always check the original packaging. Scan may not capture all ingredients — we show what we could read. Precautionary allergen statements such as “may contain” may not always be captured.";
  const heads=child?{allergen:'Things you’re allergic to',intolerance:'Things that upset your tummy'}:null;
  return(<div className="scroll view" style={{background:t.bg,padding:18}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
      <button onClick={()=>go('home')} style={{fontFamily:t.sans,fontSize:14,color:t.ink2}}>‹ Done</button>
      <button onClick={()=>setChild(c=>!c)} style={{fontFamily:t.sans,fontSize:13,fontWeight:700,color:t.accentDeep,
        background:t.accentTint,borderRadius:999,padding:'6px 12px'}}>{child?'Standard':'Child mode'}</button></div>
    <div style={{fontFamily:t.serif,fontSize:23,color:t.ink,margin:'8px 0 1px'}}>{product.name}</div>
    <div className="tag" style={{fontSize:12,color:t.ink3,marginBottom:6}}>{product.date}</div>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
      <span style={{fontFamily:t.sans,fontSize:12.5,color:t.ink2}}>This session</span>
      {FAMILY.map(f=><Avatar key={f.name} t={t} k={f.k}/>)}</div>
    {findings.map((f,i)=><MatchBar key={i} t={t} data={heads?{...f,label:heads[f.cat]||f.label}:f} child={child}/>)}
    {!findings.length&&<div style={{background:t.surfaceWarm,border:`1px solid ${t.line}`,borderRadius:t.radius,padding:16,marginBottom:14}}>
      <div style={{fontFamily:t.sans,fontSize:15,color:t.ink}}>Nothing from your profile in what we could read.</div>
      <div style={{fontFamily:t.sans,fontSize:13,color:t.ink2,marginTop:4}}>Always check the original packaging.</div></div>}
    {unverified.length>0&&<div style={{marginTop:4,marginBottom:14}}>
      <div style={{fontFamily:t.sans,fontWeight:700,fontSize:13,color:t.ink2,marginBottom:8}}>Could not verify</div>
      {unverified.map((u,i)=><div key={i} style={{marginBottom:6}}>
        <span style={{fontFamily:t.sans,fontSize:14,color:'#8E857A'}}>{u.term}</span>
        {u.note&&<span style={{fontFamily:t.sans,fontSize:12.5,color:t.ink3}}> — {u.note}</span>}</div>)}
      <div style={{fontFamily:t.sans,fontSize:12.5,color:t.ink3,marginTop:6,lineHeight:'18px'}}>Not confirmed in our database. Connect to the internet or check the original label.</div></div>}
    <div style={{background:t.surface,border:`1px solid ${t.line}`,borderRadius:t.radius,padding:16,textAlign:'center',margin:'4px 0 14px'}}>
      <div style={{fontFamily:t.sans,fontSize:15,fontWeight:600,color:t.ink}}>{child?'What do you think of this one?':'How was this scan?'}</div>
      <div style={{fontFamily:t.sans,fontSize:12,color:t.ink3,margin:'3px 0 12px'}}>Optional — scroll past any time</div>
      <div style={{display:'flex',justifyContent:'space-around',fontSize:30}}>
        {['😟','🙁','😐','🙂','😊'].map((e,i)=><button key={i} onClick={()=>setRated(i)} style={{opacity:rated===null||rated===i?1:.4,transform:rated===i?'scale(1.18)':'none'}}>{e}</button>)}</div>
      {rated!==null&&<div style={{fontFamily:t.sans,fontSize:13,color:t.ink2,marginTop:12}}>Thanks — noted in your diary.</div>}
    </div>
    <div style={{borderTop:`1px solid ${t.lineSoft}`,paddingTop:13}}>
      <div style={{fontFamily:t.sans,fontSize:11.5,color:t.ink3,lineHeight:'17px'}}>{FOOTER}</div></div>
    <div style={{height:20}}/>
  </div>);
}

/* ───── 08 Diary ───── */
function Diary({t,go}){
  const days=[]; for(let d=1;d<=30;d++)days.push(d);
  const dotted={5:1,8:1,12:1,17:1,21:1,24:1,28:2};
  return(<div className="scroll view" style={{background:t.bg,padding:22}}>
    <div className="tag" style={{fontSize:13,color:t.ink3}}>9:41</div>
    <div style={{fontFamily:t.serif,fontSize:25,color:t.ink,marginTop:8}}>Diary</div>
    <div style={{fontFamily:t.sans,fontSize:13.5,color:t.ink2}}>Your personal food record</div>
    <div style={{background:t.surfaceWarm,border:`1px solid ${t.line}`,borderRadius:t.radius,padding:14,margin:'14px 0'}}>
      <div style={{fontFamily:t.sans,fontSize:14,color:t.ink}}>You’ve been tracking for 30 days.</div>
      <div style={{fontFamily:t.sans,fontSize:13,color:t.ink2,marginTop:2}}>32 scans saved so far — nicely done.</div></div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontFamily:t.serif,fontSize:17,color:t.ink}}>June 2026</span>
      <span style={{color:t.ink3}}>‹  ›</span></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginTop:10}}>
      {['M','T','W','T','F','S','S'].map((d,i)=><div key={i} className="tag" style={{textAlign:'center',fontSize:10,color:t.ink3,padding:'4px 0'}}>{d}</div>)}
      {[null,null,null,null,null].slice(0,5).map((_,i)=><div key={'x'+i}/>)}
      {days.map(d=>{const scanned=!!dotted[d], today=d===28; return(
       <div key={d} style={{aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        borderRadius:'50%',
        background: today ? t.accentSoft : (scanned ? t.accentTint : 'transparent'),
        boxShadow: today ? `0 0 0 1.5px ${t.accent}` : 'none'}}>
        <span style={{fontFamily:t.sans,fontSize:12.5,fontWeight: today?700:(scanned?600:500),
          color: today?t.accentDeep : (scanned? t.accentDeep : t.ink)}}>{d}</span>
        {scanned&&<div style={{display:'flex',gap:2,marginTop:2}}>{Array.from({length:dotted[d]}).map((_,i)=><div key={i} style={{width:4,height:4,borderRadius:2,background:t.amber}}/>)}</div>}
      </div>);})}
    </div>
    <Section t={t}>Today · 28 June</Section>
    {[['10:24','Harvest Trail Granola Bar'],['09:02','Oat & Honey Crackers']].map(([time,nm],i)=>(
      <div key={i} style={{background:t.surface,border:`1px solid ${t.line}`,borderRadius:14,padding:'13px 14px',marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          <span className="tag" style={{fontSize:11,color:t.ink3}}>{time}</span>
          <span style={{fontFamily:t.sans,fontSize:12,color:t.accentDeep}}>Tap to edit name</span></div>
        <div style={{fontFamily:t.sans,fontSize:16,fontWeight:600,color:t.ink,margin:'4px 0 2px'}}>{nm}</div>
        <button style={{fontFamily:t.sans,fontSize:13,color:t.accent,fontWeight:600}}>+ Add a note</button>
      </div>))}
    <div style={{height:14}}/>
  </div>);
}

/* ───── 09 Patterns ───── */
function Patterns({t}){
  const rows=[['Added sugars',14],['Milk',9],['Peanuts',6],['Soy lecithin',5],['Palm oil',4],['Almonds',3]];
  return(<div className="scroll view" style={{background:t.bg,padding:22}}>
    <div className="tag" style={{fontSize:13,color:t.ink3}}>9:41</div>
    <div style={{fontFamily:t.serif,fontSize:25,color:t.ink,marginTop:8}}>Patterns</div>
    <div style={{fontFamily:t.sans,fontSize:13.5,color:t.ink2}}>What shows up most in your scans</div>
    <div style={{background:t.surfaceWarm,border:`1px solid ${t.line}`,borderRadius:t.radius,padding:14,margin:'14px 0'}}>
      <div className="tag" style={{fontSize:10,letterSpacing:1,textTransform:'uppercase',color:t.ink3,marginBottom:6}}>This week</div>
      <div style={{fontFamily:t.sans,fontSize:14,color:t.ink,lineHeight:'20px'}}>Added sugars came up in most of the snacks you scanned. Just something we noticed.</div></div>
    <Section t={t}>Most frequent · last 30 days</Section>
    {rows.map(([nm,n],i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 2px',borderBottom:`1px solid ${t.lineSoft}`}}>
      <span className="tag" style={{fontSize:13,color:t.ink3,width:16}}>{i+1}</span>
      <span style={{flex:1,fontFamily:t.sans,fontSize:15,color:t.ink}}>{nm}</span>
      <span style={{fontFamily:t.sans,fontSize:14,fontWeight:700,color:t.ink2}}>{n}×</span></div>))}
    <div style={{background:t.surface,border:`1px solid ${t.line}`,borderRadius:t.radius,padding:14,marginTop:18}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
        <span style={{fontFamily:t.sans,fontSize:13.5,fontWeight:600,color:t.ink}}>Deeper patterns unlock at 50 scans</span>
        <span className="tag" style={{fontSize:13,color:t.accentDeep}}>32 / 50</span></div>
      <div style={{height:7,borderRadius:4,background:t.lineSoft,overflow:'hidden'}}><div style={{width:'64%',height:'100%',background:t.accent}}/></div>
      <div style={{fontFamily:t.sans,fontSize:12.5,color:t.ink3,marginTop:8}}>18 more scans to go. No rush — your record builds as you shop.</div></div>
    <div style={{height:14}}/>
  </div>);
}

/* ───── 10 Profiles & settings ───── */
function Profiles({t,go,profile,severity}){
  const fam=[{k:'Y',name:'You'}];
  const [active,setActive]=useState('You');
  const Row=({label,val,onClick})=>(<button onClick={onClick} style={{display:'flex',justifyContent:'space-between',width:'100%',textAlign:'left',
    alignItems:'center',padding:'13px 0',borderBottom:`1px solid ${t.lineSoft}`}}>
    <span style={{fontFamily:t.sans,fontSize:14.5,color:t.ink}}>{label}</span>
    <span style={{fontFamily:t.sans,fontSize:14,fontWeight:onClick?700:400,color:onClick?t.accentDeep:t.ink2}}>{val}</span></button>);
  const al=profile.filter(id=>id.indexOf('allergen.')===0);
  const intolIds=profile.filter(id=>id.indexOf('intol.')===0);
  const alText=al.length?al.map(id=>`${subLabel(id)} · ${severity[id]||'Moderate'}`).join('   ·   '):'None yet — tap Edit';
  const intolText=intolIds.length?intolIds.map(subLabel).join('  ·  '):'None yet';
  return(<div className="scroll view" style={{background:t.bg,padding:22}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontFamily:t.serif,fontSize:25,color:t.ink}}>Profiles</span>
      <button onClick={()=>go('appearance')} style={{fontFamily:t.sans,fontSize:13,fontWeight:700,color:t.accentDeep}}>Appearance</button></div>
    {/* self profile plus deferred family add state */}
    <div style={{display:'flex',gap:18,margin:'20px 0 8px',alignItems:'flex-start'}}>
      {fam.map(f=>{const on=active===f.name;return(
        <button key={f.name} onClick={()=>setActive(f.name)} style={{textAlign:'center'}}>
          <Avatar t={t} k={f.k} on={on} child={f.child} size={40}/>
          <div style={{fontFamily:t.sans,fontSize:12,fontWeight:on?700:500,color:on?t.ink:t.ink2,marginTop:8}}>{f.name}</div>
        </button>);})}
      <div style={{textAlign:'center'}}><div style={{width:40,height:40,borderRadius:'50%',border:`1.5px dashed ${t.line}`,display:'grid',placeItems:'center',color:t.ink3}}>+</div>
        <div style={{fontFamily:t.sans,fontSize:12,color:t.ink3,marginTop:8}}>Add</div></div></div>
    <div style={{fontFamily:t.sans,fontSize:12.5,color:t.ink3,marginBottom:4}}>Viewing <b style={{color:t.ink2}}>{active}</b>’s profile</div>
    <Section t={t} right={<button onClick={()=>go('profile_setup')} style={{fontFamily:t.sans,fontSize:12.5,fontWeight:700,color:t.accentDeep}}>Edit</button>}>Allergens</Section>
    <div style={{fontFamily:t.sans,fontSize:14.5,color:t.ink}}>{alText}</div>
    <Section t={t}>Intolerances</Section>
    <div style={{fontFamily:t.sans,fontSize:14.5,color:t.ink}}>{intolText}</div>
    <div style={{background:t.surfaceWarm,border:`1px solid ${t.line}`,borderRadius:14,padding:14,margin:'18px 0'}}>
      <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:t.sans,fontSize:14,fontWeight:600,color:t.ink}}>Scans this month</span><span style={{fontFamily:t.sans,fontSize:14,fontWeight:700,color:t.accentDeep}}>7 left</span></div>
      <div style={{fontFamily:t.sans,fontSize:12.5,color:t.ink2,marginTop:3}}>Resets on the 1st. You’re in no danger of running out this week.</div></div>
    <Section t={t}>Display</Section>
    <Row label="Appearance — colours & background" val="Change ›" onClick={()=>go('appearance')}/>
    <Section t={t}>Account</Section>
    <Row label="Email" val="Not connected"/>
    <Row label="Family allergen session" val="On"/>
    <div style={{height:14}}/>
  </div>);
}

/* ───── Appearance ───── */
function Appearance({t,keys,setKeys,go}){
  const Sw=({colors,sel,on,label})=>(<button onClick={on} style={{width:'31%',marginBottom:14}}>
    <div style={{height:52,borderRadius:13,overflow:'hidden',display:'flex',border:`${sel?2.5:1}px solid ${sel?t.accent:t.line}`}}>
      <div style={{flex:2,background:colors[0]}}/><div style={{flex:1,display:'flex',flexDirection:'column'}}>{colors.slice(1).map((c,i)=><div key={i} style={{flex:1,background:c}}/>)}</div></div>
    <div style={{fontFamily:t.sans,fontSize:12,fontWeight:600,color:sel?t.ink:t.ink2,textAlign:'center',marginTop:5}}>{label}</div></button>);
  return(<div className="scroll view" style={{background:t.bg,padding:22}}>
    <button onClick={()=>go('profiles')} style={{fontFamily:t.sans,fontSize:14,color:t.ink2,marginTop:6}}>‹ Back</button>
    <div style={{fontFamily:t.serif,fontSize:24,color:t.ink,margin:'8px 0 4px'}}>Appearance</div>
    <div style={{fontFamily:t.sans,fontSize:14,color:t.ink2,lineHeight:'21px'}}>Make it yours. Your allergen colors stay fixed so findings always read the same.</div>
    <div style={{background:t.surface,borderRadius:t.radius,border:`1px solid ${t.line}`,padding:14,margin:'16px 0 4px'}}>
      <div className="tag" style={{fontSize:10,letterSpacing:1,textTransform:'uppercase',color:t.ink3,marginBottom:10}}>Preview</div>
      <MatchBar t={t} data={{cat:'allergen',label:'Allergen Match',items:[{common:'Peanuts',kind:'contains'}]}}/>
      <Btn t={t}>Scan a label</Btn></div>
    <Section t={t}>Background</Section>
    <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between'}}>
      {Object.entries(BACKGROUNDS).map(([k,p])=><Sw key={k} label={p.label} colors={[p.bg,p.bgDeep,p.surfaceWarm]} sel={keys.background===k} on={()=>setKeys(v=>({...v,background:k}))}/>)}</div>
    <Section t={t}>Accent</Section>
    <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between'}}>
      {Object.entries(ACCENTS).map(([k,p])=><Sw key={k} label={p.label} colors={[p.accent,p.accentDeep,p.accentSoft]} sel={keys.accent===k} on={()=>setKeys(v=>({...v,accent:k}))}/>)}</div>
    <div style={{height:14}}/>
  </div>);
}

/* ───── APP ───── */
const TABBED = {diary:1,patterns:1,profiles:1,home:1};
function App(){
  const [keys,setKeys]=useStored('anvara.p3.theme',{background:'blossom',accent:'fuchsia'});
  const [profile,setProfile]=useStored('anvara.p3.profile',['allergen.peanut','allergen.treenut','intol.lactose']);
  const [severity,setSeverity]=useStored('anvara.p3.sev',{'allergen.peanut':'Severe','allergen.treenut':'Severe'});
  const [screen,setScreen]=useStored('anvara.p3.screen','welcome');
  const [result,setResult]=useState(null);
  const t=useMemo(()=>buildTheme(keys.background,keys.accent),[keys]);
  const go=s=>setScreen(s);
  let view;
  if(screen==='welcome') view=<Welcome t={t} go={go}/>;
  else if(screen==='profile_setup') view=<ProfileSetup t={t} profile={profile} setProfile={setProfile} severity={severity} setSeverity={setSeverity} go={go}/>;
  else if(screen==='email') view=<Email t={t} go={go}/>;
  else if(screen==='camera') view=<Camera t={t} go={go} profile={profile}/>;
  else if(screen==='processing') view=<Processing t={t} profile={profile} go={go} setResult={setResult}/>;
  else if(screen==='result'&&result) view=<Result t={t} go={go} result={result}/>;
  else if(screen==='diary') view=<Diary t={t} go={go}/>;
  else if(screen==='patterns') view=<Patterns t={t}/>;
  else if(screen==='profiles') view=<Profiles t={t} go={go} profile={profile} severity={severity}/>;
  else if(screen==='appearance') view=<Appearance t={t} keys={keys} setKeys={setKeys} go={go}/>;
  else { view=<Diary t={t} go={go}/>; }
  const showTabs = TABBED[screen]||screen==='diary';
  return <div className="phone">
    {view}
    {showTabs&&<Tabs t={t} screen={screen} go={go}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
